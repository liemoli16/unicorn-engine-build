name: Build Unicorn for Android (aarch64, v2.1.4) - full build dir

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Unicorn (v2.1.4)
        uses: actions/checkout@v4
        with:
          repository: unicorn-engine/unicorn
          ref: '2.1.4'
          submodules: true

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29
          local-cache: true

      - name: Configure CMake for Android aarch64
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_NATIVE_API_LEVEL=android-21 \
            -DUNICORN_ARCH=aarch64

      - name: Build
        run: cmake --build build -j

      - name: Upload entire build directory
        uses: actions/upload-artifact@v4
        with:
          name: unicorn-android-aarch64-build-dir
          path: build/
