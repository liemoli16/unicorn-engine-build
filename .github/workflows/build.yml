name: Build Unicorn for Android (aarch64, v2.1.4)

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Unicorn (v2.1.4)
        uses: actions/checkout@v4
        with:
          repository: unicorn-engine/unicorn
          ref: '2.1.4'
          submodules: true

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r29c          # 或 r29
          local-cache: true

      - name: Configure CMake for Android aarch64
        run: |
          mkdir -p build install
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DUNICORN_ARCHS="aarch64" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$(pwd)/../install   # 安装到项目根目录下的 install 文件夹

      - name: Build and install
        run: |
          cmake --build build -j
          cmake --install build --strip

      - name: Upload entire build directory and installed files
        uses: actions/upload-artifact@v4
        with:
          name: unicorn-android-aarch64-build-dir
          path: |
            build/
            install/
